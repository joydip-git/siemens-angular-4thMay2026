<h2>Service App</h2>
@if(people && people.length>0){
<div>
    <label for="ddlNames">Select a Person: </label>
    &nbsp;
    <select name="ddlNames" id="ddlNames">
        <option value="-1" selected disabled>--select--</option>
        @for (name of people; track $index) {
        <option [value]="$index">
            {{name}}
        </option>
        }
    </select>
</div>
}
@else {
<span>No names</span>
}
