<h2>List of Products</h2>
<br>
@if(!isRequestOver()){
<app-load-spinner></app-load-spinner>
}
@else if (errorInfo()!=='') {
<span>{{errorInfo()}}</span>
}
@else if(products().length===0){
<span>No records</span>
}
@else{
<table class="table table-hover">
    <thead>
        <tr>
            <th>Image</th>
            <th>Name</th>
            <th>Price</th>
            <th>Rating</th>
            <th>Delete</th>
        </tr>
    </thead>
    <tbody class="table-dark">
        @for (p of (products()|filterProduct:filterText()); track $index) {
        <tr>
            <td>
                <img [src]="p.imageUrl" alt="NA" class="img-size-style" [routerLink]="['/products','view',p.productId]">
            </td>
            <td>{{p.productName}}</td>
            <td>{{p.price}}</td>
            <td>{{p.starRating}}</td>
            <td>
                <button class="btn btn-danger">
                    Delete
                </button>
            </td>
        </tr>
        }
    </tbody>
</table>
}
